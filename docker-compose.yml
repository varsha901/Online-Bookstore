services:
  mongodb:
    image: mongo:5
    container_name: bookstore-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    image: bookstore-app:latest
    container_name: bookstore-app
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/bookstore
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      JWT_EXPIRATION: 7d
    depends_on:
      - mongodb

volumes:
  mongodb_data: