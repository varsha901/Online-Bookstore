<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMINA BOOKS • Timeless Reads</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero-bg {
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
      url('https://plus.unsplash.com/premium_photo-1677567996070-68fa4181775a?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
    }
    .book-card { transition: all 0.4s ease; }
    .book-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .book-img { height: 380px; object-fit: contain; background: #1f2937; padding: 12px; }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-200">

<nav class="fixed top-0 w-full bg-zinc-950/95 backdrop-blur-md z-50 border-b border-zinc-800">
  <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-3xl font-light tracking-widest text-amber-100">LUMINA</h1>

    <div class="flex items-center gap-10 text-lg">
      <a href="#" onclick="showSection('home')" class="hover:text-amber-200">Home</a>
      <a href="#" onclick="showSection('featured')" class="hover:text-amber-200">Featured</a>
      <a href="#" onclick="showSection('catalog')" class="hover:text-amber-200">Catalog</a>
    </div>

    <div class="flex items-center gap-6">
   <input
  id="searchInput"
  type="search"
  name="lumina-book-search"
  autocomplete="off"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
  placeholder="Search books or authors..."
  class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 w-80 focus:outline-none focus:border-amber-400"
/>
      <button id="authButton" onclick="showLoginModal()" class="flex items-center gap-2 hover:text-amber-200">
        <i class="fas fa-user"></i> <span id="userName">Sign In</span>
      </button>

      <button onclick="showWishlistModal()" class="relative p-3 hover:bg-zinc-800 rounded-2xl">
        <i class="fas fa-heart text-2xl"></i>
        <span id="wishlistCount" class="absolute -top-1 -right-1 bg-red-500 text-xs w-5 h-5 flex items-center justify-center rounded-full">0</span>
      </button>

      <button onclick="showCartModal()" class="relative p-3 hover:bg-zinc-800 rounded-2xl">
        <i class="fas fa-shopping-bag text-2xl"></i>
        <span id="cartCount" class="absolute -top-1 -right-1 bg-amber-500 text-xs w-5 h-5 flex items-center justify-center rounded-full">0</span>
      </button>
    </div>
  </div>
</nav>

<section id="home" class="hero-bg h-screen flex items-center justify-center text-center">
  <div class="max-w-4xl px-6">
    <h2 class="text-6xl md:text-7xl font-light tracking-tight mb-6">Timeless stories.<br>Curated for you.</h2>
    <p class="text-2xl text-zinc-400 mb-10">Discover the world's finest literature • 2026</p>
    <button onclick="showSection('catalog')" class="bg-amber-100 text-zinc-900 px-12 py-5 rounded-2xl font-medium hover:bg-amber-200 text-xl">
      Browse Full Collection
    </button>
  </div>
</section>

<section id="featured" class="hidden py-24 bg-zinc-900">
  <div class="max-w-7xl mx-auto px-6">
    <h2 class="text-5xl font-light text-center mb-16">Featured Books</h2>
    <div class="grid md:grid-cols-4 gap-8" id="featuredBooks"></div>
  </div>
</section>

<section id="catalog" class="hidden py-24 bg-zinc-900">
  <div class="max-w-7xl mx-auto px-6">
    <h2 class="text-5xl font-light text-center mb-12">Book Catalog</h2>
    <div class="grid md:grid-cols-4 gap-8" id="catalogBooks"></div>
  </div>
</section>

<div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
  <div class="bg-zinc-900 rounded-3xl p-10 w-full max-w-md relative">
    <button onclick="hideLoginModal()" class="absolute top-6 right-6 text-3xl text-zinc-400 hover:text-zinc-200">×</button>

    <h3 class="text-3xl font-light mb-8 text-center">Welcome to Lumina</h3>

    <div class="flex border-b border-zinc-700 mb-8">
      <button onclick="switchTab(0)" id="loginTab" class="flex-1 py-3 text-lg border-b-2 border-amber-400 text-amber-100">Sign In</button>
      <button onclick="switchTab(1)" id="registerTab" class="flex-1 py-3 text-lg text-zinc-400">Create Account</button>
    </div>

    <div id="loginForm">
      <input id="loginEmail" type="email" placeholder="Email address" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-4">
      <input id="loginPassword" type="password" placeholder="Password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-8">
      <button onclick="handleLogin()" class="w-full bg-amber-100 text-zinc-900 py-4 rounded-2xl font-medium">Sign In</button>
    </div>

    <div id="registerForm" class="hidden">
      <input id="regName" type="text" placeholder="Full Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-4">
      <input id="regEmail" type="email" placeholder="Email address" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-4">
      <input id="regPassword" type="password" placeholder="Password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-4">
      <input id="regConfirmPassword" type="password" placeholder="Confirm Password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-8">
      <button onclick="handleRegister()" class="w-full bg-amber-100 text-zinc-900 py-4 rounded-2xl font-medium">Create Account</button>
    </div>
  </div>
</div>

<div id="checkoutModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
  <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-lg">
    <h3 class="text-3xl font-light mb-6">Checkout</h3>
    <div id="checkoutItems" class="max-h-80 overflow-auto mb-6 space-y-3"></div>
    <div class="border-t border-zinc-700 pt-4 flex justify-between text-xl font-medium">
      <span>Total</span>
      <span id="checkoutTotal"></span>
    </div>
    <button onclick="completePayment()" class="mt-8 w-full bg-emerald-600 hover:bg-emerald-700 py-5 rounded-2xl text-lg font-medium">Place Order</button>
    <button onclick="hideCheckoutModal()" class="mt-4 w-full text-zinc-400">Cancel</button>
  </div>
</div>

<div id="successModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
  <div class="bg-zinc-900 rounded-3xl p-12 text-center max-w-md">
    <i class="fas fa-check-circle text-7xl text-emerald-500 mb-6"></i>
    <h2 class="text-4xl font-light mb-4">Order Placed Successfully!</h2>
    <p class="text-zinc-400 mb-8">Thank you for shopping at Lumina Books.</p>
    <button onclick="hideSuccessModal()" class="bg-amber-100 text-zinc-900 px-12 py-4 rounded-2xl font-medium">Continue Shopping</button>
  </div>
</div>

<script>
  const API_URL = "/api";

  let token = localStorage.getItem("token");
  let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;
  let allBooks = [];
  let cartItems = [];
  let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

  async function apiRequest(url, options = {}) {
    const headers = options.headers || {};

    if (token) {
      headers["Authorization"] = `Bearer ${token}`;
    }

    headers["Content-Type"] = "application/json";

    const res = await fetch(url, { ...options, headers });
    return res.json();
  }

  async function loadBooks() {
    try {
      const result = await apiRequest(`${API_URL}/books`);

      if (!result.success) {
        alert("Failed to load books");
        return;
      }

      allBooks = result.data;
      renderBooks("featuredBooks", allBooks.slice(0, 9));
      renderBooks("catalogBooks", allBooks);
    } catch (error) {
      alert("Backend is not reachable. Make sure npm run dev is running.");
    }
  }

  function renderBooks(containerId, booksList) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    booksList.forEach(book => {
      const isWishlisted = wishlist.some(id => id === book._id);
      const image = book.coverImage || "https://via.placeholder.com/300x450?text=Book";

      const div = document.createElement("div");
      div.className = "book-card bg-zinc-800 rounded-3xl overflow-hidden cursor-pointer";
      div.innerHTML = `
        <img src="${image}" class="book-img w-full" onclick="showBookDetails('${book._id}')">
        <div class="p-6">
          <h3 class="text-xl font-light">${book.title}</h3>
          <p class="text-zinc-400">${book.author}</p>
          <p class="text-zinc-500 text-sm mt-2">${book.category || "General"}</p>
          <div class="flex justify-between items-center mt-6">
            <span class="text-2xl font-light">$${book.price}</span>
            <div class="flex gap-3">
              <button onclick="toggleWishlist('${book._id}'); event.stopImmediatePropagation()" class="text-2xl ${isWishlisted ? "text-red-500" : "text-zinc-400 hover:text-red-400"}">
                <i class="fas fa-heart"></i>
              </button>
              <button onclick="addToCart('${book._id}'); event.stopImmediatePropagation()" class="bg-amber-100 hover:bg-amber-200 text-zinc-900 px-6 py-2.5 rounded-2xl text-sm font-medium">
                Add to Cart
              </button>
            </div>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  async function handleLogin() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value.trim();

    const result = await apiRequest(`${API_URL}/auth/login`, {
      method: "POST",
      body: JSON.stringify({ email, password })
    });

    if (!result.success) {
      alert(result.message);
      return;
    }

    token = result.token;
    currentUser = {
      name: result.data.firstName,
      email: result.data.email
    };

    localStorage.setItem("token", token);
    localStorage.setItem("currentUser", JSON.stringify(currentUser));

    updateUserUI();
    hideLoginModal();
    await loadCart();
    alert("Login successful");
  }

  async function handleRegister() {
    const name = document.getElementById("regName").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value.trim();
    const confirm = document.getElementById("regConfirmPassword").value.trim();

    if (!name || !email || !password || !confirm) {
      alert("Please fill in all fields");
      return;
    }

    if (password !== confirm) {
      alert("Passwords do not match");
      return;
    }

    const parts = name.split(" ");
    const firstName = parts[0];
    const lastName = parts.slice(1).join(" ") || "User";

    const result = await apiRequest(`${API_URL}/auth/register`, {
      method: "POST",
      body: JSON.stringify({ firstName, lastName, email, password })
    });

    if (!result.success) {
      alert(result.message);
      return;
    }

    token = result.token;
    currentUser = {
      name: result.data.firstName,
      email: result.data.email
    };

    localStorage.setItem("token", token);
    localStorage.setItem("currentUser", JSON.stringify(currentUser));

    updateUserUI();
    hideLoginModal();
    await loadCart();
    alert("Account created successfully");
  }

  async function loadCart() {
    if (!token) {
      cartItems = [];
      document.getElementById("cartCount").textContent = 0;
      return;
    }

    const result = await apiRequest(`${API_URL}/cart`);

    if (result.success) {
      cartItems = result.data.items || [];
      document.getElementById("cartCount").textContent = cartItems.length;
    }
  }

  async function addToCart(bookId) {
    if (!token) {
      alert("Please login first");
      showLoginModal();
      return;
    }

    const result = await apiRequest(`${API_URL}/cart`, {
      method: "POST",
      body: JSON.stringify({ bookId, quantity: 1 })
    });

    if (!result.success) {
      alert(result.message);
      return;
    }

    cartItems = result.data.items;
    document.getElementById("cartCount").textContent = cartItems.length;
    alert("Book added to cart");
  }

  async function showCartModal() {
    if (!token) {
      alert("Please login first");
      showLoginModal();
      return;
    }

    await loadCart();

    if (cartItems.length === 0) {
      alert("Your cart is empty");
      return;
    }

    showCheckoutModal();
  }

  function showCheckoutModal() {
    let total = 0;
    let html = "";

    cartItems.forEach(item => {
      const book = item.book;
      const lineTotal = book.price * item.quantity;
      total += lineTotal;

      html += `
        <div class="flex justify-between py-2 border-b border-zinc-800">
          <span>${book.title} × ${item.quantity}</span>
          <span>$${lineTotal.toFixed(2)}</span>
        </div>
      `;
    });

    document.getElementById("checkoutItems").innerHTML = html;
    document.getElementById("checkoutTotal").textContent = `$${total.toFixed(2)}`;
    document.getElementById("checkoutModal").classList.remove("hidden");
  }

  async function completePayment() {
    const result = await apiRequest(`${API_URL}/orders`, {
      method: "POST",
      body: JSON.stringify({
        shippingAddress: {
          fullName: currentUser ? currentUser.name : "Customer",
          address: "123 Test Street",
          city: "Toronto",
          province: "ON",
          postalCode: "M1M 1M1",
          country: "Canada"
        }
      })
    });

    if (!result.success) {
      alert(result.message);
      return;
    }

    hideCheckoutModal();
    document.getElementById("successModal").classList.remove("hidden");

    cartItems = [];
    document.getElementById("cartCount").textContent = 0;
  }

  function toggleWishlist(bookId) {
    if (wishlist.includes(bookId)) {
      wishlist = wishlist.filter(id => id !== bookId);
    } else {
      wishlist.push(bookId);
    }

    localStorage.setItem("wishlist", JSON.stringify(wishlist));
    document.getElementById("wishlistCount").textContent = wishlist.length;

    renderBooks("featuredBooks", allBooks.slice(0, 4));
    renderBooks("catalogBooks", allBooks);
  }

  function showWishlistModal() {
    if (wishlist.length === 0) {
      alert("Your wishlist is empty");
      return;
    }

    const books = allBooks.filter(book => wishlist.includes(book._id));
    let msg = "Wishlist:\n\n";
    books.forEach(book => msg += `- ${book.title}\n`);
    alert(msg);
  }

  function showBookDetails(id) {
    const book = allBooks.find(b => b._id === id);
    if (book) {
      alert(`${book.title}\nBy ${book.author}\nCategory: ${book.category}\nPrice: $${book.price}\n\n${book.description}`);
    }
  }

  function updateUserUI() {
    const authButton = document.getElementById("authButton");

    if (currentUser) {
      authButton.innerHTML = `
        <i class="fas fa-user"></i>
        <span id="userName">${currentUser.name}</span>
        <span onclick="logout(); event.stopPropagation();" class="ml-3 text-xs bg-zinc-800 hover:bg-red-900/50 hover:text-red-400 px-3 py-1 rounded-xl">
          Logout
        </span>
      `;
      authButton.onclick = null;
    } else {
      authButton.innerHTML = `<i class="fas fa-user"></i> <span id="userName">Sign In</span>`;
      authButton.onclick = showLoginModal;
    }
  }

  function logout() {
    currentUser = null;
    token = null;
    cartItems = [];

    localStorage.removeItem("token");
    localStorage.removeItem("currentUser");

    document.getElementById("cartCount").textContent = 0;
    updateUserUI();
    alert("Logged out successfully");
  }

  function showLoginModal() {
    document.getElementById("loginModal").classList.remove("hidden");
    switchTab(0);
  }

  function hideLoginModal() {
    document.getElementById("loginModal").classList.add("hidden");
  }

  function switchTab(tab) {
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");

    if (tab === 0) {
      loginForm.classList.remove("hidden");
      registerForm.classList.add("hidden");
      loginTab.classList.add("border-b-2", "border-amber-400", "text-amber-100");
      registerTab.classList.remove("border-b-2", "border-amber-400", "text-amber-100");
    } else {
      loginForm.classList.add("hidden");
      registerForm.classList.remove("hidden");
      loginTab.classList.remove("border-b-2", "border-amber-400", "text-amber-100");
      registerTab.classList.add("border-b-2", "border-amber-400", "text-amber-100");
    }
  }

  function showSection(section) {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("featured").classList.add("hidden");
    document.getElementById("catalog").classList.add("hidden");
    document.getElementById(section).classList.remove("hidden");
  }

  function hideCheckoutModal() {
    document.getElementById("checkoutModal").classList.add("hidden");
  }

  function hideSuccessModal() {
    document.getElementById("successModal").classList.add("hidden");
    showSection("home");
  }

  document.getElementById("searchInput").addEventListener("input", function () {
    const term = this.value.toLowerCase();

    const filtered = allBooks.filter(book =>
      book.title.toLowerCase().includes(term) ||
      book.author.toLowerCase().includes(term) ||
      (book.category || "").toLowerCase().includes(term)
    );

    renderBooks("catalogBooks", filtered);
    showSection("catalog");
  });

 window.onload = async () => {

    // Clear search box
    document.getElementById("searchInput").value = "";

    document.getElementById("wishlistCount").textContent = wishlist.length;
    updateUserUI();
    await loadBooks();
    await loadCart();
    showSection("home");
};
</script>

</body>
</html>
